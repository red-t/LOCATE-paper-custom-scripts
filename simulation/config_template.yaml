# Simulation Pipeline configuration file template
# Copy this file to species_configs/<species>.yaml and modify parameters accordingly

species: rice                          # Species name (human/fly/dm6/rice, etc.)
mode: 1                                # 1=Training data, 2=Test data
share_pgdf: false                      # Share PGDF files across protocols (true=share same ground truth template)

# Output directory
output_dir: /path/to/output            # Simulation data output directory

# Reference file paths
reference:
  template: /path/to/template.fa       # Reference genome template (requires .fai index)
  transposon: /path/to/transposon.fa   # TE consensus sequences (requires .fai index)
  repeat_bed: /path/to/repeat.bed      # RepeatMasker annotation
  gap_bed: /path/to/gap.bed            # Gap region annotation
  blacklist: /path/to/blacklist.bed    # Optional: Blacklist region BED
  germ_model: /path/to/germ_model/     # Optional: Germline classification model directory
  soma_model: /path/to/soma_model/     # Optional: Somatic classification model directory

# Simulation parameters
simulation:
  population_size: 100                 # Population genome size (number of haplotypes)
  sub_population_size: 5               # Sub-population size, haplotypes per batch
  germline_count: 1000                 # Number of germline insertions per frequency gradient
  avg_somatic_count: 50                # Average number of somatic insertions per genome
  min_distance: 9000                   # Minimum distance between TE insertions
  divergence_rate: 0                   # TE sequence divergence rate (percent)
  trunc_prob: 0.1                      # Truncation probability
  nest_prob: 0.1                       # Nested insertion probability

# Sequencing parameters
sequencing:
  depths: [10, 20, 30, 40, 50]         # Sequencing depths
  protocols: [ccs, clr, ont]           # Sequencing protocols list
  generate_ngs: false                  # Generate NGS data (true/false)
  ngs_read_length: 150                 # NGS read length (optional)
  ngs_inner_distance: 200              # NGS inner distance (optional)
  ngs_std_dev: 20                      # NGS std dev (optional)

# Dataset configuration
datasets:
  # Number of datasets to generate per depth
  # Format: depth -> count
  50: 20
  40: 20
  30: 20
  20: 20
  10: 20

# SLURM configuration
slurm:
  partition: 4hours                    # SLURM partition
  exclude: ""                          # Comma-separated list of nodes to exclude (e.g., "node1,node2")
  threads: 30                          # Number of threads
  mem_simulation: 10G                  # Memory for simulation tasks
  mem_merge: 40G                       # Memory for merge tasks
  mem_minimap2: 60G                    # Memory for minimap2 tasks
  mem_label: 30G                       # Memory for label tasks
  time: "4:00:00"                      # Task time limit
  array_limit: 10                      # Parallel task limit

# Conda environment
conda_envs:
  default: simulation
  step0: simulation
  step2: simulation
  step4: TEMP3
  step5: TEMP3
  step7: TEMP3
conda_path: /you/path/to/mambaforge/etc/profile.d/conda.sh

# Step 6 classification parameters
classification:
  somatic_freq: 0.01                        # Germline/somatic frequency threshold

# Step 7: ML training pipeline configuration
ml_training:
  enabled: true                             # Enable Step 7
  output_dir: null                          # null = auto: {output_dir}/For_ML/{species}/
  test_frac: 0.1                            # Test set fraction (evenly sampled from each depth/protocol, default 0.1)
  random_seed: 42                           # Random seed (for reproducibility, default 42)

  # Blacklist parameters
  blacklist:
    min_sample_overlap: 10                  # Minimum number of samples sharing a negative case to be blacklisted (default 10)
    max_length: 50                          # Maximum length of a blacklist region (default 50)

  # Mode definitions (germline high-frequency / somatic low-frequency)
  modes:
    germline:
      enabled: true
      positive_sources: [TP_clt_G.txt]      # Positive class source files
      positive_filter:
        cltType_expr: "==0"                 # cltType == 0 indicates germline
        score_threshold: 0.8                # teAlignedFrac >= 0.8
      pos_label: 1                          # Positive class label value
      dedup_blacklist: BlackList_G.bed      # Blacklist for deduplication
      drop_columns: [chrom, refStart, refEnd, cid, strand, sample_id,
        startIndex, endIndex, numSeg2, directionFlag, cltType,
        teAlignedFrac, teTid, isInBlacklist, probability]         # Columns to drop during training (keep numSeg)
      train_ratios:                         # Training positive:negative ratios
        - name: ORG                         # ORG = full data
        - name: 1V1                         # 1V1 = 1:1 positive:negative
      test_ratios:
        - name: ORG
        - name: 1V1
      negative_sampling: without_replacement  # Negative sampling without replacement

    somatic:
      enabled: true
      positive_sources: [TP_clt_G.txt, TP_clt_S.txt]  # Positive sources (G+S combined)
      positive_filter:
        cltType_expr: ">0"                 # cltType > 0 indicates somatic
        score_threshold: 1                  # teAlignedFrac >= 1
      pos_label: 2                          # Positive class label value
      dedup_blacklist: BlackList_S.bed      # Blacklist for deduplication
      drop_columns: [chrom, refStart, refEnd, cid, strand, sample_id,
        startIndex, endIndex, numSeg, numSeg2, directionFlag,
        bgDepth, teAlignedFrac, teTid, isInBlacklist, probability] # Also drop numSeg and bgDepth
      train_ratios:
        - name: 1V30
      test_ratios:
        - name: 1V30
      negative_sampling: with_replacement   # Negative sampling with replacement (limited data)

# Program paths (auto-detected, usually no modification needed)
programs:
  simulation_dir: null                 # Simulation script directory, null = auto-detect
  label_dir: null                      # Label script directory, null = auto-detect (simulation_dir/label)
  temp3_dir: null                      # TEMP3 directory, null = auto-detect (simulation_dir/../TEMP3)
