# dm6 (Drosophila melanogaster) 配置示例
# 使用已有的参考文件

species: dm6
mode: 1
share_pgdf: true

# 输出目录
output_dir: /data/tusers/zhongrenhu/for_SMS/dna/simulation/dm6/v4

# 参考文件路径
reference:
  template: /data/tusers/zhongrenhu/for_SMS/reference/dm6/train/dm6_template.fa
  transposon: /data/tusers/zhongrenhu/for_SMS/reference/dm6/train/dm6_clean.transposon.fa
  repeat_bed: /data/tusers/zhongrenhu/for_SMS/reference/dm6/train/dm6.repeat.bed
  gap_bed: /data/tusers/zhongrenhu/for_SMS/reference/dm6/train/dm6.gap.bed
  blacklist: /data/tusers/zhongrenhu/for_SMS/reference/dm6/train/dm6.BlackList.bed
  soma_model: /data/tusers/zhongrenhu/for_SMS/dna/simulation/dm6/For_ML/soma_v4/Dedup/dm6_S_1V30
  germ_model: /data/tusers/zhongrenhu/for_SMS/dna/simulation/dm6/For_ML/germ_v4/Dedup/dm6_G_1V1

# 模拟参数
simulation:
  population_size: 100
  sub_population_size: 5
  germline_count: 1000
  avg_somatic_count: 50
  min_distance: 9000
  divergence_rate: 0
  trunc_prob: 0.1
  nest_prob: 0.1

# 测序参数
sequencing:
  depths: [10, 20, 30, 40, 50]
  protocols: [ccs, clr, ont]

# 数据集配置
datasets:
  50: 20
  40: 20
  30: 20
  20: 20
  10: 20

# SLURM 配置
slurm:
  partition: 4hours
  exclude: "z1076,z1071,z1075,z1077,z1078,z1066,z1085,z1021,z1084"
  threads: 30
  mem_simulation: 10G
  mem_merge: 40G
  mem_minimap2: 60G
  mem_label: 30G
  time: "4:00:00"
  array_limit: 10

# Conda 环境
conda_envs:
  default: simulation
  step0: simulation
  step2: simulation
  step4: TEMP3
  step5: TEMP3
conda_path: /zata/zippy/boxu/for_hzr/Software/miniforge3/etc/profile.d/conda.sh

# Step 6 分类参数
classification:
  somatic_freq: 0.01

# Step 7: ML 训练 Pipeline
ml_training:
  enabled: true

# 程序路径
programs:
  simulation_dir: null
  label_dir: null
  temp3_dir: null