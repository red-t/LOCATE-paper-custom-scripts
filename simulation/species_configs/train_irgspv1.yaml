# rice (IRGSPv1) training data configuration
# Modify paths and parameters according to your environment

species: IRGSPv1
mode: 1
share_pgdf: false

# Output directory
output_dir: /zata/zippy/boxu/for_hzr/Simulation

# Reference file paths
reference:
  template: /zata/zippy/boxu/for_hzr/Simulation/reference/IRGSPv1.fa
  transposon: /zata/zippy/boxu/for_hzr/Simulation/reference/IRGSPv1.transposon.fa
  repeat_bed: /zata/zippy/boxu/for_hzr/Simulation/reference/IRGSPv1.repeat.bed
  gap_bed: /zata/zippy/boxu/for_hzr/Simulation/reference/IRGSPv1.gap.bed
  blacklist: /zata/zippy/boxu/for_hzr/Simulation/reference/IRGSPv1.BlackList.bed
  soma_model: /zata/zippy/boxu/for_hzr/Software/SimulationTest/data/dm6_S_1V30
  germ_model: /zata/zippy/boxu/for_hzr/Software/SimulationTest/data/dm6_G_1V1

# Simulation parameters - tuned for rice genome characteristics
simulation:
  population_size: 100                # Population genome size
  sub_population_size: 10             # Sub-population size
  germline_count: 1000                # Number of germline insertions
  avg_somatic_count: 50               # Average number of somatic insertions
  min_distance: 9000                  # Minimum distance (adjusted for rice genome size)
  divergence_rate: 0                  # TE divergence rate
  trunc_prob: 0.1                     # Truncation probability
  nest_prob: 0.1                      # Nested insertion probability

# Sequencing parameters
sequencing:
  depths: [10, 20, 30, 40, 50]        # Sequencing depths
  protocols: [ccs, clr, ont]          # Sequencing protocols

# Dataset configuration
datasets:
  50: 10
  40: 10
  30: 10
  20: 10
  10: 10

# SLURM configuration - adjust based on your cluster
slurm:
  partition: 4hours
  exclude: "z1076,z1071,z1075,z1077,z1078,z1066,z1085,z1021,z1084"
  threads: 24
  mem_simulation: 20G
  mem_merge: 20G
  mem_minimap2: 30G
  mem_label: 30G
  time: "4:00:00"
  array_limit: 10

# Conda environment
conda_envs:
  default: simulation
  step0: simulation
  step2: simulation
  step4: TEMP3
  step5: TEMP3
  step7: TEMP3
conda_path: /zata/zippy/boxu/for_hzr/Software/miniforge3/etc/profile.d/conda.sh

# Step 6 classification parameters
classification:
  somatic_freq: 0.01

# Step 7: ML training pipeline configuration
ml_training:
  enabled: true                             # Enable Step 7
  output_dir: null                          # null = auto: {output_dir}/For_ML/{species}/
  test_frac: 0.1                            # Test set fraction (evenly sampled from each depth/protocol, default 0.1)
  random_seed: 42                           # Random seed (for reproducibility, default 42)

  # Blacklist parameters
  blacklist:
    min_sample_overlap: 10                  # Minimum number of samples sharing a negative case to be blacklisted (default 10)
    max_length: 50                          # Maximum length of a blacklist region (default 50)

  # Mode definitions (germline high-frequency / somatic low-frequency)
  modes:
    germline:
      enabled: true
      positive_sources: [TP_clt_G.txt]      # Positive class source files
      positive_filter:
        cltType_expr: "==0"                 # cltType == 0 indicates germline
        score_threshold: 0.8                # teAlignedFrac >= 0.8
      pos_label: 1                          # Positive class label value
      dedup_blacklist: BlackList_G.bed      # Blacklist for deduplication
      drop_columns: [chrom, refStart, refEnd, cid, strand, sample_id,
        startIndex, endIndex, numSeg2, directionFlag, cltType,
        teAlignedFrac, teTid, isInBlacklist, probability]         # Columns to drop during training (keep numSeg)
      train_ratios:                         # Training positive:negative ratios
        - name: ORG                         # ORG = full data
      test_ratios:
        - name: ORG
      negative_sampling: without_replacement  # Negative sampling without replacement

    somatic:
      enabled: true
      positive_sources: [TP_clt_G.txt, TP_clt_S.txt]  # Positive sources (G+S combined)
      positive_filter:
        cltType_expr: ">0"                 # cltType > 0 indicates somatic
        score_threshold: 1                  # teAlignedFrac >= 1
      pos_label: 2                          # Positive class label value
      dedup_blacklist: BlackList_S.bed      # Blacklist for deduplication
      drop_columns: [chrom, refStart, refEnd, cid, strand, sample_id,
        startIndex, endIndex, numSeg, numSeg2, directionFlag,
        bgDepth, teAlignedFrac, teTid, isInBlacklist, probability] # Also drop numSeg and bgDepth
      train_ratios:
        - name: 1V30
      test_ratios:
        - name: 1V30
      negative_sampling: with_replacement   # Negative sampling with replacement (limited data)

# Program paths
programs:
  simulation_dir: null
  label_dir: null
  temp3_dir: null
