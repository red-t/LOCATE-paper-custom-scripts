# 水稻 (Oryza sativa) 配置模板
# 请根据实际情况修改路径和参数

species: IRGSPv1
mode: 1
share_pgdf: false

# 输出目录
output_dir: /zata/zippy/boxu/for_hzr/Simulation

# 参考文件路径
reference:
  template: /zata/zippy/boxu/for_hzr/Simulation/reference/IRGSPv1.fa
  transposon: /zata/zippy/boxu/for_hzr/Simulation/reference/IRGSPv1.transposon.fa
  repeat_bed: /zata/zippy/boxu/for_hzr/Simulation/reference/IRGSPv1.repeat.bed
  gap_bed: /zata/zippy/boxu/for_hzr/Simulation/reference/IRGSPv1.gap.bed
  blacklist: /zata/zippy/boxu/for_hzr/Simulation/reference/IRGSPv1.BlackList.bed
  soma_model: /zata/zippy/boxu/for_hzr/Software/SimulationTest/data/dm6_S_1V30
  germ_model: /zata/zippy/boxu/for_hzr/Software/SimulationTest/data/dm6_G_1V1

# 模拟参数 - 根据水稻特性调整
simulation:
  population_size: 100                # 群体基因组大小
  sub_population_size: 10             # 子群体大小
  germline_count: 1000                # Germline insertion 数量
  avg_somatic_count: 50               # 平均 somatic insertion 数量
  min_distance: 9000                  # 最小距离 (根据水稻基因组大小调整)
  divergence_rate: 0                  # TE divergence rate
  trunc_prob: 0.1                     # Truncation 概率
  nest_prob: 0.1                      # Nested insertion 概率

# 测序参数
sequencing:
  depths: [10, 20, 30, 40, 50]        # 测序深度
  protocols: [ccs, clr, ont]          # 测序协议

# 数据集配置
datasets:
  50: 10
  40: 10
  30: 10
  20: 10
  10: 10

# SLURM 配置 - 根据集群调整
slurm:
  partition: 4hours
  exclude: "z1076,z1071,z1075,z1077,z1078,z1066,z1085,z1021,z1084"
  threads: 24
  mem_simulation: 20G
  mem_merge: 20G
  mem_minimap2: 30G
  mem_label: 30G
  time: "4:00:00"
  array_limit: 10

# Conda 环境
conda_envs:
  default: simulation
  step0: simulation
  step2: simulation
  step4: TEMP3
  step5: TEMP3
  step7: TEMP3
conda_path: /zata/zippy/boxu/for_hzr/Software/miniforge3/etc/profile.d/conda.sh

# Step 6 分类参数
classification:
  somatic_freq: 0.01

# Step 7: ML 训练 Pipeline（使用模板默认值）
ml_training:
  enabled: true

# 程序路径
programs:
  simulation_dir: null
  label_dir: null
  temp3_dir: null