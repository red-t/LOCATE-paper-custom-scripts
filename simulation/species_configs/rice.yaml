# 水稻 (Oryza sativa) 配置模板
# 请根据实际情况修改路径和参数

species: rice
mode: 1
share_pgdf: false

# 输出目录 - 请修改为实际路径
output_dir: /path/to/rice/simulation/output

# 参考文件路径 - 请修改为实际路径
reference:
  template: /path/to/rice_template.fa           # 参考基因组模板 (需要 .fai 索引)
  transposon: /path/to/rice_transposon.fa       # TE consensus 序列 (需要 .fai 索引)
  repeat_bed: /path/to/rice_repeat.bed          # RepeatMasker 注释
  gap_bed: /path/to/rice_gap.bed                # Gap 区域注释
  blacklist: /path/to/rice_blacklist.bed        # 黑名单区域注释
  soma_model: /path/to/rice_S_1V30              # Soma 模型
  germ_model: /path/to/rice_G_1V1               # Germline 模

# 模拟参数 - 根据水稻特性调整
simulation:
  population_size: 100                # 群体基因组大小
  sub_population_size: 5              # 子群体大小
  germline_count: 1000                # Germline insertion 数量
  avg_somatic_count: 50               # 平均 somatic insertion 数量
  min_distance: 9000                  # 最小距离 (根据水稻基因组大小调整)
  divergence_rate: 0                  # TE divergence rate
  trunc_prob: 0.1                     # Truncation 概率
  nest_prob: 0.1                      # Nested insertion 概率

# 测序参数
sequencing:
  depths: [10, 20, 30, 40, 50]        # 测序深度
  protocols: [ccs, clr, ont]          # 测序协议

# 数据集配置
datasets:
  50: 20
  40: 20
  30: 20
  20: 20
  10: 20

# SLURM 配置 - 根据集群调整
slurm:
  partition: gpu
  threads: 24
  mem_simulation: 20G
  mem_merge: 20G
  mem_minimap2: 20G
  mem_label: 20G
  time: "4:00:00"
  array_limit: 10

# Conda 环境
conda_envs:
  default: simulation
  step0: simulation
  step2: simulation
  step4: TEMP3
  step5: TEMP3
conda_path: /zata/zippy/boxu/for_hzr/Software/miniforge3/etc/profile.d/conda.sh

# Step 6 分类参数
classification:
  somatic_freq: 0.01

# 程序路径
programs:
  simulation_dir: null
  label_dir: null
  temp3_dir: null