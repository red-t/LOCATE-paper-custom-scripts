# dm6 (Drosophila melanogaster) configuration example
# Using existing reference files

species: dm6
mode: 1
share_pgdf: false

# Output directory
output_dir: /zata/zippy/boxu/for_hzr/Simulation

# Reference file paths
reference:
  template: /zata/zippy/boxu/for_hzr/Simulation/reference/dm6_template.fa
  transposon: /zata/zippy/boxu/for_hzr/Simulation/reference/dm6_clean.transposon.fa
  repeat_bed: /zata/zippy/boxu/for_hzr/Simulation/reference/dm6.repeat.bed
  gap_bed: /zata/zippy/boxu/for_hzr/Simulation/reference/dm6.gap.bed
  blacklist: /zata/zippy/boxu/for_hzr/Simulation/reference/dm6.BlackList.bed
  soma_model: /zata/zippy/boxu/for_hzr/Software/SimulationTest/data/dm6_S_1V30
  germ_model: /zata/zippy/boxu/for_hzr/Software/SimulationTest/data/dm6_G_1V1

# Simulation parameters
simulation:
  population_size: 100
  sub_population_size: 5
  germline_count: 1000
  avg_somatic_count: 50
  min_distance: 9000
  divergence_rate: 0
  trunc_prob: 0.1
  nest_prob: 0.1

# Sequencing parameters
sequencing:
  depths: [10, 20, 30, 40, 50]
  protocols: [ccs, clr, ont]

# Dataset configuration
datasets:
  50: 20
  40: 20
  30: 20
  20: 20
  10: 20

# SLURM configuration
slurm:
  partition: 4hours
  exclude: "z1076,z1071,z1075,z1077,z1078,z1066,z1085,z1021,z1084"
  threads: 30
  mem_simulation: 20G
  mem_merge: 20G
  mem_minimap2: 30G
  mem_label: 30G
  time: "4:00:00"
  array_limit: 10

# Conda environment
conda_envs:
  default: simulation
  step0: simulation
  step2: simulation
  step4: TEMP3
  step5: TEMP3
  step7: TEMP3
conda_path: /zata/zippy/boxu/for_hzr/Software/miniforge3/etc/profile.d/conda.sh

# Step 6 classification parameters
classification:
  somatic_freq: 0.01

# Step 7: ML training pipeline
ml_training:
  enabled: true

# Program paths
programs:
  simulation_dir: null
  label_dir: null
  temp3_dir: null
