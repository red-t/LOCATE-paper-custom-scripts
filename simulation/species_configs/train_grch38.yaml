# human (GRCh38) training data configuration
# Simulation parameters reference GRCh38/README.md and v4 production config

species: human
mode: 1
share_pgdf: false

# Output directory
output_dir: /zata/zippy/boxu/for_hzr/Simulation

# Reference file paths
reference:
  template: /zata/zippy/boxu/for_hzr/Simulation/reference/GRCh38.fa
  transposon: /zata/zippy/boxu/for_hzr/Simulation/reference/GRCh38.transposon.fa
  repeat_bed: /zata/zippy/boxu/for_hzr/Simulation/reference/GRCh38.repeat.bed
  gap_bed: /zata/zippy/boxu/for_hzr/Simulation/reference/GRCh38.gap.bed
  blacklist: /zata/zippy/boxu/for_hzr/Simulation/reference/GRCh38.BlackList.bed
  soma_model: /data/tusers/zhongrenhu/for_SMS/dna/simulation/GRCh38/For_ML/soma_v4/Dedup/GRCh38_S_1V30
  germ_model: /data/tusers/zhongrenhu/for_SMS/dna/simulation/GRCh38/For_ML/germ_v4/Dedup/GRCh38_G_1V1

# Simulation parameters
simulation:
  population_size: 100
  sub_population_size: 5
  germline_count: 3000
  avg_somatic_count: 500
  min_distance: 9000
  divergence_rate: 0
  trunc_prob: 0.1
  nest_prob: 0.1

# Sequencing parameters
sequencing:
  depths: [10, 20, 30, 40, 50]
  protocols: [ccs, clr, ont]

# Dataset configuration (10 per depth × 3 protocols = 150 total datasets)
datasets:
  50: 10
  40: 10
  30: 10
  20: 10
  10: 10

# SLURM configuration (human genome is larger, requires more time and memory)
slurm:
  partition: 5days
  exclude: "z1076,z1071,z1075,z1077,z1078,z1066,z1085,z1021,z1084"
  threads: 24
  mem_simulation: 20G
  mem_merge: 20G
  mem_minimap2: 50G
  mem_label: 50G
  time: "12:00:00"
  array_limit: 10

# Conda environment
conda_envs:
  default: simulation
  step0: simulation
  step2: simulation
  step4: TEMP3
  step5: TEMP3
  step7: TEMP3
conda_path: /zata/zippy/boxu/for_hzr/Software/miniforge3/etc/profile.d/conda.sh

# Step 6 classification parameters
classification:
  somatic_freq: 0.01

# Step 7: ML training pipeline
ml_training:
  enabled: true

# Program paths
programs:
  simulation_dir: null
  label_dir: null
  temp3_dir: null
