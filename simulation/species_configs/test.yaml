# dm6 (Drosophila melanogaster) 配置示例
# 使用已有的参考文件

species: dm6
mode: 1
share_pgdf: false

# 输出目录
output_dir: /zata/zippy/boxu/for_hzr/Software/SimulationTest

# 参考文件路径
reference:
  template: /zata/zippy/boxu/for_hzr/Software/SimulationTest/data/dm6_template.fa
  transposon: /zata/zippy/boxu/for_hzr/Software/SimulationTest/data/rice.transposon.fa
  repeat_bed: /zata/zippy/boxu/for_hzr/Software/SimulationTest/data/dm6.repeat.bed
  gap_bed: /zata/zippy/boxu/for_hzr/Software/SimulationTest/data/dm6.gap.bed
  blacklist: /zata/zippy/boxu/for_hzr/Software/SimulationTest/data/dm6.BlackList.bed
  soma_model: /zata/zippy/boxu/for_hzr/Software/SimulationTest/data/dm6_S_1V30
  germ_model: /zata/zippy/boxu/for_hzr/Software/SimulationTest/data/dm6_G_1V1

# 模拟参数
simulation:
  population_size: 10
  sub_population_size: 2
  germline_count: 500
  avg_somatic_count: 5
  min_distance: 9000
  divergence_rate: 0
  trunc_prob: 0.1
  nest_prob: 0.1

# 测序参数
sequencing:
  depths: [10]
  protocols: [ccs, ont]

# 数据集配置
datasets:
  10: 1

# SLURM 配置
slurm:
  partition: gpu
  exclude: "z1076,z1071,z1075,z1077,z1078,z1066,z1085,z1021,z1084"
  threads: 24
  mem_simulation: 20G
  mem_merge: 20G
  mem_minimap2: 20G
  mem_label: 20G
  time: "4:00:00"
  array_limit: 5

# Conda 环境
conda_envs:
  default: simulation
  step0: simulation
  step2: simulation
  step4: TEMP3
  step5: TEMP3
  step7: TEMP3
conda_path: /zata/zippy/boxu/for_hzr/Software/miniforge3/etc/profile.d/conda.sh

# Step 6 分类参数
classification:
  somatic_freq: 0.11

# Step 7: ML 训练 Pipeline 配置
ml_training:
  enabled: true


# 程序路径
programs:
  simulation_dir: null
  label_dir: null
  temp3_dir: null