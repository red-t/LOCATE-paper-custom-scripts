# fly (dm6) 测试数据配置
# 使用 pbsim3 生成 ONT reads, mode=2 确保物种特异 TE 比例

species: fly
mode: 2
share_pgdf: true

output_dir: /zata/zippy/boxu/for_hzr/Simulation/TestingDataset/Dm6

reference:
  template: /zata/zippy/boxu/for_hzr/Simulation/reference/dm6.fa
  transposon: /zata/zippy/boxu/for_hzr/Simulation/reference/dm6.transposon.fa

simulation:
  simulator: pbsim
  pbsim_model: /zata/zippy/boxu/for_hzr/Software/pbsim3/data/QSHMM-ONT-HQ.model
  population_size: 1000
  sub_population_size: 50
  germline_count: 500
  avg_somatic_count: 0
  min_distance: 9000
  divergence_rate: 0
  trunc_prob: 0.1
  nest_prob: 0
# simulation:
#   population_size: 100
#   sub_population_size: 100
#   germline_count: 500
#   avg_somatic_count: 0
#   min_distance: 9000
#   divergence_rate: 0
#   trunc_prob: 0.1
#   nest_prob: 0

sequencing:
  depths: [50]
  protocols: [ont]
  generate_ngs: false
  ngs_read_length: 150
  ngs_inner_distance: 200
  ngs_std_dev: 20
# sequencing:
#   depths: [50]
#   protocols: [ccs, clr]

datasets:
  50: 1

slurm:
  partition: 4hours
  exclude: "z1076,z1071,z1075,z1077,z1078,z1066,z1085,z1021,z1084"
  threads: 24
  mem_simulation: 20G
  mem_merge: 20G
  time: "4:00:00"
  array_limit: 7

conda_path: /zata/zippy/boxu/for_hzr/Software/miniforge3/etc/profile.d/conda.sh
conda_envs:
  default: simulation
  step0: simulation
  step2: simulation
